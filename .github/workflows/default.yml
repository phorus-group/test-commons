name: "Default Workflow"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize]
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  default-workflow:
    uses: phorus-group/workflows/.github/workflows/back.lib.gradle.yml@main
    with:
      disable-integration-test: true
      disable-unit-test: true
      disable-version-validation: ${{ github.event_name != 'release' }}
      disable-publish: ${{ github.event_name != 'release' }}
      build-and-test: true
      publish-task: publishToMavenCentral
      metadata-base-url: https://repo1.maven.org/maven2
      metadata-auth-method: none
      registry-username: ${{ vars.MAVEN_CENTRAL_USERNAME }}
      slack-releases-channel: "C0AM8AEGJG7"
      slack-failure-channel: "C0AMP6VM0EB"
      publish-environment: production
      publish-environment-url: https://mvnrepository.com/artifact/group.phorus/test-commons
    secrets:
      pub-auth-value: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      signing-key: ${{ secrets.SIGNING_KEY }}
      signing-password: ${{ secrets.SIGNING_PASSWORD }}
      slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  ci-assistant:
    needs: [default-workflow]
    if: ${{ failure() }}
    uses: phorus-group/workflows/.github/workflows/ci-assistant.yml@main
    with:
      java-version: "21"
      slack-failure-channel: "C0AMP6VM0EB"
      admin-users: ${{ vars.CI_ASSISTANT_ADMIN_USERS }}
      banned-users: ${{ vars.CI_ASSISTANT_BANNED_USERS }}
      github-app-id: "3210197"
    secrets:
      claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
      github-app-private-key: ${{ secrets.CI_ASSISTANT_PRIVATE_KEY }}
